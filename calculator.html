<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Calculator App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            margin-top: 50px;
            background: #f0f0f0;
        }

        .calculator {
            border: 2px solid #333;
            padding: 20px;
            border-radius: 10px;
            width: 240px;
            background-color: #222;
        }

        #display {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 24px;
            padding: 5px;
            border-radius: 5px;
            color: black;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
        }

        button.operator {
            background-color: #555;
        }

        button.equal {
            background-color: #0066ff;
            color: #fff;
        }

        button.clear {
            background-color: red;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>
        <div class="buttons">
        <!-- Top row: All Clear and Backspace spanning 2 columns each -->
        <button onclick="allClear()" class="clear" style="grid-column: span 2;">AC</button>
        <button onclick="backspace()" class="clear" style="grid-column: span 2;">⌫</button>

        <!-- Numbers and operators -->
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('/')" class="operator">÷</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('*')" class="operator">×</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('-')" class="operator">−</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
        <button onclick="append('+')" class="operator">+</button>
    </div>
</div>

<script>
    let expression = "";

    function append(value) {
        expression += value;
        document.getElementById("display").value = expression;
    }

    function allClear() {
        expression = "";
        document.getElementById("display").value = "";
    }

    function backspace() {
        expression = expression.slice(0, -1);
        document.getElementById("display").value = expression;
    }

    async function calculate() {
        try {
            if (!expression) return;

            const response = await fetch('/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ expression })
            });

            const data = await response.json();
            expression = data.result.toString();
            document.getElementById("display").value = expression;

        } catch (err) {
            document.getElementById("display").value = "Error";
        }
    }
</script>

</body>
</html>
